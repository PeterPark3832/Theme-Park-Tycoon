<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="630" viewBox="0 0 1280 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0D1535"/>
      <stop offset="100%" stop-color="#020510"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <ellipse cx="640" cy="200" rx="400" ry="200" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="200" cy="500" rx="200" ry="120" fill="#FF6B9D" fill-opacity="0.05" filter="url(#blur1)"/>
  <ellipse cx="1100" cy="150" rx="180" ry="100" fill="#00E5A0" fill-opacity="0.05" filter="url(#blur1)"/>

  <!-- Grid dots -->
  <g opacity="0.08">
    <line x1="0" y1="210" x2="1280" y2="210" stroke="#6688FF" stroke-width="1"/>
    <line x1="0" y1="420" x2="1280" y2="420" stroke="#6688FF" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="630" stroke="#6688FF" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="630" stroke="#6688FF" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#6688FF" stroke-width="1"/>
  </g>

  <!-- Decorative building cards (left) -->
  <g transform="translate(80, 200)">
    <rect width="120" height="100" rx="12" fill="#0D1235" stroke="#4ECDC433" stroke-width="1.5"/>
    <text x="60" y="42" text-anchor="middle" font-size="28">🎡</text>
    <text x="60" y="72" text-anchor="middle" font-size="11" fill="#4ECDC4" font-family="sans-serif" font-weight="700">관람차</text>
    <text x="60" y="88" text-anchor="middle" font-size="10" fill="#2E3A5C" font-family="sans-serif">Ferris Wheel</text>
  </g>

  <g transform="translate(80, 320)">
    <rect width="120" height="100" rx="12" fill="#0D1235" stroke="#FF6B9D33" stroke-width="1.5"/>
    <text x="60" y="42" text-anchor="middle" font-size="28">🎢</text>
    <text x="60" y="72" text-anchor="middle" font-size="11" fill="#FF6B9D" font-family="sans-serif" font-weight="700">롤러코스터</text>
    <text x="60" y="88" text-anchor="middle" font-size="10" fill="#2E3A5C" font-family="sans-serif">Roller Coaster</text>
  </g>

  <!-- Decorative building cards (right) -->
  <g transform="translate(1080, 200)">
    <rect width="120" height="100" rx="12" fill="#0D1235" stroke="#FECA5733" stroke-width="1.5"/>
    <text x="60" y="42" text-anchor="middle" font-size="28">🎠</text>
    <text x="60" y="72" text-anchor="middle" font-size="11" fill="#FECA57" font-family="sans-serif" font-weight="700">회전목마</text>
    <text x="60" y="88" text-anchor="middle" font-size="10" fill="#2E3A5C" font-family="sans-serif">Carousel</text>
  </g>

  <g transform="translate(1080, 320)">
    <rect width="120" height="100" rx="12" fill="#0D1235" stroke="#5EF6A033" stroke-width="1.5"/>
    <text x="60" y="42" text-anchor="middle" font-size="28">🍔</text>
    <text x="60" y="72" text-anchor="middle" font-size="11" fill="#5EF6A0" font-family="sans-serif" font-weight="700">푸드코트</text>
    <text x="60" y="88" text-anchor="middle" font-size="10" fill="#2E3A5C" font-family="sans-serif">Food Court</text>
  </g>

  <!-- Main title area -->
  <!-- Emoji row -->
  <text x="500" y="185" font-size="36" text-anchor="middle" opacity="0.8">🎡</text>
  <text x="556" y="178" font-size="30" text-anchor="middle" opacity="0.7">🎢</text>
  <text x="608" y="185" font-size="34" text-anchor="middle" opacity="0.8">🎠</text>
  <text x="660" y="178" font-size="30" text-anchor="middle" opacity="0.7">🎪</text>
  <text x="712" y="185" font-size="32" text-anchor="middle" opacity="0.75">🚂</text>
  <text x="764" y="178" font-size="28" text-anchor="middle" opacity="0.7">🎆</text>

  <!-- PARCADIA title -->
  <text x="640" y="290" text-anchor="middle"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-weight="900" font-size="88" letter-spacing="12"
        fill="#FFD93D"
        filter="url(#blur2)"
        opacity="0.4">PARCADIA</text>
  <text x="640" y="290" text-anchor="middle"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-weight="900" font-size="88" letter-spacing="12"
        fill="#FFD93D">PARCADIA</text>

  <!-- Subtitle -->
  <text x="640" y="328" text-anchor="middle"
        font-family="'Arial', sans-serif"
        font-weight="600" font-size="18" letter-spacing="8"
        fill="#4A5880">BUILD · MANAGE · THRIVE</text>

  <!-- Divider -->
  <line x1="440" y1="350" x2="840" y2="350" stroke="#2E3A5C" stroke-width="1"/>

  <!-- Korean description -->
  <text x="640" y="385" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif"
        font-size="22" fill="#9B7FFF" font-weight="600">
    나만의 테마파크를 건설하고 경영하세요
  </text>

  <!-- Feature tags -->
  <g transform="translate(350, 415)">
    <rect width="120" height="28" rx="14" fill="#00E5A018" stroke="#00E5A044" stroke-width="1"/>
    <text x="60" y="19" text-anchor="middle" font-size="13" fill="#00E5A0" font-family="sans-serif">🎯 8 시나리오</text>
  </g>
  <g transform="translate(490, 415)">
    <rect width="120" height="28" rx="14" fill="#FFD93D18" stroke="#FFD93D44" stroke-width="1"/>
    <text x="60" y="19" text-anchor="middle" font-size="13" fill="#FFD93D" font-family="sans-serif">🏗️ 27종 건물</text>
  </g>
  <g transform="translate(630, 415)">
    <rect width="120" height="28" rx="14" fill="#FF6B9D18" stroke="#FF6B9D44" stroke-width="1"/>
    <text x="60" y="19" text-anchor="middle" font-size="13" fill="#FF6B9D" font-family="sans-serif">☀️ 계절 시스템</text>
  </g>
  <g transform="translate(770, 415)">
    <rect width="130" height="28" rx="14" fill="#5EF6A018" stroke="#5EF6A044" stroke-width="1"/>
    <text x="65" y="19" text-anchor="middle" font-size="13" fill="#5EF6A0" font-family="sans-serif">⚡ 완전 무료</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="575" width="1280" height="55" fill="#0A0D1E" opacity="0.9"/>
  <text x="640" y="610" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="14" fill="#2E3A5C" letter-spacing="3">
    PARCADIA  ·  v1.0  ·  FREE BROWSER GAME
  </text>

  <!-- Corner decorations -->
  <rect x="0" y="0" width="4" height="630" fill="#FFD93D" opacity="0.3"/>
  <rect x="1276" y="0" width="4" height="630" fill="#FFD93D" opacity="0.3"/>
  <rect x="0" y="0" width="1280" height="3" fill="#FFD93D" opacity="0.2"/>
  <rect x="0" y="627" width="1280" height="3" fill="#FFD93D" opacity="0.2"/>
</svg>
